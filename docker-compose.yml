services:
  revoice-bot:
    build: .
    container_name: revoice-bot
    depends_on:
      - postgres
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=${REDIS_URL}
      - REDIS_PORT=${REDIS_PORT}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
    networks:
      - revoice-net

  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      - POSTGRES_DB=revoice
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/18/main
    ports:
      - "5432:5432"
    networks:
      - revoice-net

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - revoice-net

volumes:
  postgres-data:

networks:
  revoice-net:
